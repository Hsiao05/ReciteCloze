<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>背诵完形</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eeecea;
      --panel: #fbf3e7;
      --panel-soft: #fffdf9;
      --panel-tint: #f4eadb;
      --ink: #352c27;
      --subtle: #8b7b6d;
      --line: rgba(185, 156, 126, 0.13);
      --line-strong: rgba(173, 141, 108, 0.2);
      --accent: #f0d1a5;
      --accent-strong: #e9bd83;
      --accent-ink: #4c3829;
      --green: #b8dea5;
      --gold: #dcc37a;
      --red: #f4b7ba;
      --red-ink: #704246;
      --core: #f6c0c6;
      --broad: #d7c8ef;
      --plain: #cfe0dd;
      --important: #df7078;
      --keep-bg: #eef6e9;
      --keep-line: #c6dfb6;
      --focus: 0 0 0 4px rgba(240, 209, 165, 0.42), 0 8px 24px rgba(166, 138, 110, 0.08);
      --shadow: 0 26px 56px rgba(149, 122, 96, 0.18), 0 8px 18px rgba(149, 122, 96, 0.08), inset 0 1px 3px rgba(255, 255, 255, 0.86);
      --shadow-soft: 0 14px 34px rgba(164, 133, 102, 0.14), inset 0 1px 2px rgba(255, 255, 255, 0.72);
      --shadow-pressed: inset 0 3px 10px rgba(145, 119, 94, 0.12), inset 0 1px 1px rgba(255, 255, 255, 0.8);
      --motion: 180ms cubic-bezier(0.2, 0.8, 0.2, 1);
      font-family: Inter, "Segoe UI", "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    body[data-theme="dark"] {
      color-scheme: dark;
      --bg: #1d2128;
      --panel: #2b2e38;
      --panel-soft: #353946;
      --panel-tint: #242833;
      --ink: #f1ece4;
      --subtle: #c0b6aa;
      --line: rgba(223, 205, 184, 0.09);
      --line-strong: rgba(223, 205, 184, 0.14);
      --accent: #d8b689;
      --accent-strong: #e6c692;
      --accent-ink: #2b2118;
      --green: #99c88f;
      --gold: #d0b667;
      --red: #df9aa0;
      --red-ink: #352326;
      --core: #c98291;
      --broad: #9d8abe;
      --plain: #779391;
      --important: #f08b92;
      --keep-bg: #334436;
      --keep-line: #587251;
      --focus: 0 0 0 4px rgba(216, 182, 137, 0.3), 0 10px 26px rgba(18, 21, 29, 0.18);
      --shadow: 0 28px 60px rgba(18, 21, 29, 0.36), 0 8px 22px rgba(18, 21, 29, 0.22), inset 0 1px 3px rgba(255, 255, 255, 0.08);
      --shadow-soft: 0 16px 34px rgba(18, 21, 29, 0.24), inset 0 1px 2px rgba(255, 255, 255, 0.08);
      --shadow-pressed: inset 0 3px 10px rgba(18, 21, 29, 0.22);
    }

    * { box-sizing: border-box; }
    html, body {
      min-height: 100%;
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      background:
        radial-gradient(circle at 15% 8%, rgba(255, 247, 235, 0.72), transparent 28%),
        radial-gradient(circle at 84% 6%, rgba(240, 209, 165, 0.36), transparent 24%),
        linear-gradient(180deg, rgba(247, 240, 230, 0.92), rgba(238, 236, 234, 0) 330px),
        var(--bg);
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0;
    }

    body[data-theme="dark"] {
      background:
        radial-gradient(circle at 14% 8%, rgba(102, 92, 118, 0.28), transparent 30%),
        radial-gradient(circle at 86% 8%, rgba(216, 182, 137, 0.18), transparent 26%),
        linear-gradient(180deg, rgba(46, 50, 61, 0.85), rgba(29, 33, 40, 0) 320px),
        var(--bg);
    }

    button, input, textarea, select { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }

    .shell {
      width: min(1220px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 28px 0 34px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 22px;
    }

    .page-switch {
      position: relative;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      width: 342px;
      padding: 5px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.76);
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(16px);
    }

    body[data-theme="dark"] .page-switch,
    body[data-theme="dark"] .status,
    body[data-theme="dark"] .api-mode,
    body[data-theme="dark"] .font-control,
    body[data-theme="dark"] .toast {
      background: rgba(53, 57, 70, 0.84);
    }

    .page-switch::before {
      content: "";
      position: absolute;
      inset: 5px auto 5px 5px;
      width: calc((100% - 10px) / 3);
      border-radius: 999px;
      background: linear-gradient(180deg, #f5dcb7, var(--accent));
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.72), 0 8px 18px rgba(188, 148, 103, 0.22);
      transition: transform var(--motion);
      z-index: 0;
    }

    .page-switch[data-page="config"]::before { transform: translateX(100%); }
    .page-switch[data-page="recite"]::before { transform: translateX(200%); }

    .page-switch button {
      position: relative;
      z-index: 1;
      min-width: 0;
      height: 38px;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-size: 14px;
      user-select: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--motion), transform var(--motion);
    }

    .page-switch button.active {
      color: var(--accent-ink);
      font-weight: 650;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      min-width: 0;
      max-width: 100%;
    }

    .theme-toggle {
      position: relative;
      width: 48px;
      height: 48px;
      border: 0;
      border-radius: 999px;
      color: #e79a32;
      background:
        radial-gradient(circle at 36% 30%, rgba(255, 247, 205, 0.95), rgba(255, 203, 85, 0.82) 45%, rgba(241, 144, 64, 0.78) 74%),
        #fff9ee;
      cursor: pointer;
      display: grid;
      place-items: center;
      user-select: none;
      box-shadow: 0 10px 22px rgba(196, 143, 74, 0.23), inset 0 2px 3px rgba(255, 255, 255, 0.9);
      transition: transform var(--motion), box-shadow var(--motion);
    }

    .theme-toggle::before {
      content: "";
      position: absolute;
      top: 7px;
      right: 6px;
      width: 15px;
      height: 15px;
      background: #ffb533;
      clip-path: polygon(50% 0%, 61% 31%, 95% 18%, 76% 50%, 100% 77%, 65% 70%, 50% 100%, 35% 70%, 0% 77%, 24% 50%, 5% 18%, 39% 31%);
      filter: drop-shadow(0 2px 3px rgba(210, 132, 48, 0.24));
    }

    body[data-theme="dark"] .theme-toggle {
      color: #f4d499;
      background:
        radial-gradient(circle at 36% 30%, rgba(249, 226, 181, 0.92), rgba(211, 165, 101, 0.8) 44%, rgba(84, 78, 98, 0.8) 76%),
        var(--panel-soft);
    }

    .theme-toggle svg {
      width: 18px;
      height: 18px;
      stroke-width: 2.2;
      filter: drop-shadow(0 1px 0 rgba(255, 255, 255, 0.55));
    }

    .status {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 10px;
      min-height: 44px;
      min-width: min(332px, 42vw);
      padding: 10px 18px 10px 12px;
      border: 0;
      border-radius: 999px;
      color: var(--subtle);
      font-size: 15px;
      font-weight: 650;
      text-align: left;
      background: rgba(255, 253, 248, 0.82);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.82), 0 10px 24px rgba(164, 133, 102, 0.08);
      position: relative;
      overflow: hidden;
      transition: background var(--motion), box-shadow var(--motion);
      backdrop-filter: blur(14px);
    }

    .status::before {
      content: "";
      position: absolute;
      inset: 0;
      width: var(--progress, 0%);
      background: color-mix(in srgb, var(--accent) 24%, transparent);
      opacity: 0;
      transition: width 220ms ease, opacity var(--motion);
      z-index: 0;
    }

    .status[data-busy="true"] {
      color: var(--ink);
      background: rgba(255, 249, 240, 0.92);
      box-shadow: var(--shadow-soft);
    }

    .status[data-busy="true"]::before { opacity: 1; }
    .status > * { position: relative; z-index: 1; }

    .status-dot {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      background: var(--green);
      flex: 0 0 auto;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.78), 0 5px 12px rgba(114, 164, 97, 0.18);
    }

    .status[data-tone="warn"] .status-dot { background: var(--gold); }
    .status[data-tone="error"] .status-dot { background: var(--red); }

    .view { display: none; }
    .view.active { display: block; }

    .config-grid {
      display: grid;
      grid-template-columns: minmax(340px, 0.96fr) minmax(340px, 1.04fr);
      gap: 28px;
      align-items: stretch;
    }

    .panel {
      min-width: 0;
      background: var(--panel);
      border: 0;
      border-radius: 30px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 24px 30px 10px;
      border-bottom: 0;
      background: transparent;
    }

    .panel-head.stack {
      align-items: flex-start;
      flex-direction: column;
      justify-content: flex-start;
      gap: 8px;
    }

    .panel-title {
      margin: 0;
      font-size: 27px;
      line-height: 1.2;
      letter-spacing: 0;
      font-weight: 760;
    }

    .hint {
      color: var(--subtle);
      font-size: 13px;
      line-height: 1.45;
    }

    .panel-body { padding: 14px 30px 30px; }

    label {
      display: grid;
      gap: 12px;
      margin-bottom: 18px;
      color: var(--ink);
      font-size: 20px;
      line-height: 1.25;
      font-weight: 450;
    }

    textarea, input, select {
      width: 100%;
      border: 0;
      border-radius: 17px;
      color: var(--ink);
      background: var(--panel-soft);
      outline: none;
      box-shadow: var(--shadow-pressed);
      transition: box-shadow var(--motion), background var(--motion), transform var(--motion);
    }

    textarea:focus, input:focus, select:focus { box-shadow: var(--focus); }

    textarea {
      min-height: 330px;
      padding: 18px 20px;
      resize: vertical;
      line-height: 1.6;
      font-size: 15px;
    }

    input, select {
      height: 48px;
      padding: 0 18px;
      font-size: 16px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .key-field {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 50px;
      gap: 10px;
      align-items: center;
    }

    .api-mode {
      --active-index: 0;
      position: relative;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5px;
      padding: 5px;
      margin-bottom: 22px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.78);
      box-shadow: var(--shadow-soft);
    }

    .api-mode::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 5px;
      bottom: 5px;
      left: 5px;
      width: calc(50% - 5px);
      border-radius: 999px;
      background: linear-gradient(180deg, #f5dcb8, var(--accent));
      transform: translateX(calc(var(--active-index) * 100%));
      transition: transform var(--motion);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.72), 0 8px 18px rgba(188, 148, 103, 0.2);
    }

    .api-mode button {
      position: relative;
      z-index: 1;
      min-width: 0;
      height: 42px;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      user-select: none;
      font-size: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--motion), transform var(--motion);
    }

    .api-mode button.active {
      color: var(--accent-ink);
      font-weight: 650;
    }

    .api-custom-fields[hidden] { display: none; }

    .icon-button {
      height: 48px;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf9, #f5eadb);
      cursor: pointer;
      display: inline-grid;
      place-items: center;
      user-select: none;
      box-shadow: var(--shadow-soft);
      transition: transform var(--motion), box-shadow var(--motion);
    }

    body[data-theme="dark"] .icon-button { background: linear-gradient(180deg, #3d414e, #303441); }

    .icon-button svg {
      width: 19px;
      height: 19px;
      stroke-width: 2;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .btn {
      min-width: 0;
      min-height: 48px;
      padding: 0 24px;
      border: 0;
      border-radius: 999px;
      color: var(--accent-ink);
      background: linear-gradient(180deg, #f5dcb8, var(--accent));
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      user-select: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 650;
      box-shadow: 0 12px 24px rgba(188, 148, 103, 0.18), inset 0 1px 2px rgba(255, 255, 255, 0.78);
      transition: transform var(--motion), box-shadow var(--motion), filter var(--motion);
    }

    .btn:hover, .icon-button:hover, .theme-toggle:hover { filter: saturate(1.04) brightness(1.01); }

    .btn.secondary {
      color: var(--ink);
      background: linear-gradient(180deg, #fffdf8, #eee7de);
      box-shadow: 0 10px 22px rgba(142, 120, 98, 0.12), inset 0 1px 2px rgba(255, 255, 255, 0.82);
    }

    body[data-theme="dark"] .btn.secondary { background: linear-gradient(180deg, #404552, #343844); }

    .btn.subtle {
      color: var(--ink);
      background: #e6eeed;
      box-shadow: 0 10px 22px rgba(113, 134, 128, 0.13), inset 0 1px 2px rgba(255, 255, 255, 0.76);
    }

    body[data-theme="dark"] .btn.subtle { background: #3a4548; }

    .btn.danger {
      color: var(--red-ink);
      background: linear-gradient(180deg, #facdd0, var(--red));
      box-shadow: 0 12px 24px rgba(206, 116, 123, 0.18), inset 0 1px 2px rgba(255, 255, 255, 0.72);
    }

    .btn:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .btn:not(:disabled):active,
    .icon-button:active,
    .theme-toggle:active,
    .page-switch button:active,
    .api-mode button:active,
    .mode-tabs button:active {
      transform: scale(0.97);
    }

    .marked-editor {
      min-height: 430px;
      max-height: 580px;
      overflow: auto;
      padding: 18px 20px 84px;
      border: 0;
      border-radius: 18px;
      background: var(--panel-soft);
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
      font: 13px/1.6 Consolas, "Courier New", monospace;
      outline: none;
      box-shadow: var(--shadow-pressed);
      transition: box-shadow var(--motion), background var(--motion);
    }

    .marked-editor:focus { box-shadow: var(--focus); }

    .protocol {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 18px;
    }

    .result-protocol {
      width: 100%;
      margin-top: 2px;
    }

    .protocol-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 40px;
      padding: 9px 12px;
      border: 0;
      border-radius: 14px;
      background: rgba(255, 253, 248, 0.62);
      color: var(--subtle);
      font-size: 12px;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.78);
    }

    .result-protocol .protocol-item {
      min-height: 30px;
      padding: 6px 10px;
      border-radius: 11px;
      font-size: 11px;
      line-height: 1.35;
    }

    .result-protocol .swatch {
      width: 18px;
      height: 11px;
    }

    body[data-theme="dark"] .protocol-item { background: rgba(53, 57, 70, 0.62); }

    .swatch {
      width: 22px;
      height: 14px;
      border-radius: 999px;
      flex: 0 0 auto;
      background: var(--plain);
    }

    .swatch.keep {
      background: var(--keep-bg);
      border: 1px solid var(--keep-line);
    }

    .swatch.core { background: var(--core); }
    .swatch.broad { background: var(--broad); }

    .cards-wrap {
      width: min(520px, 100%);
      margin: 0 auto;
    }

    .cards-list {
      display: grid;
      gap: 14px;
      margin-top: 8px;
    }

    .cache-card {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) 50px 50px;
      gap: 10px;
      align-items: stretch;
      padding: 10px;
      border-radius: 18px;
      background: rgba(255, 253, 248, 0.78);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.82), 0 10px 22px rgba(142, 120, 98, 0.08);
    }

    body[data-theme="dark"] .cache-card {
      background: rgba(53, 57, 70, 0.72);
    }

    .cache-card-main {
      min-width: 0;
      display: grid;
      align-content: center;
      gap: 7px;
    }

    .cache-title {
      color: var(--ink);
      font-size: 16px;
      font-weight: 700;
      line-height: 1.35;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      word-break: break-word;
    }

    .cache-meta {
      color: var(--subtle);
      font-size: 11px;
      line-height: 1.35;
    }

    .cache-card .btn {
      min-height: 0;
      height: 100%;
      min-width: 0;
      padding: 0 8px;
      border-radius: 9px;
      white-space: normal;
      line-height: 1.25;
    }

    .cache-card .btn.danger {
      writing-mode: vertical-rl;
      letter-spacing: 0.05em;
    }

    .cards-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-top: 34px;
    }

    .cards-actions .btn.primary-wide {
      grid-column: 1 / -1;
    }

    .cards-empty {
      margin-top: 10px;
      padding: 28px 18px;
      border-radius: 18px;
      color: var(--subtle);
      text-align: center;
      line-height: 1.6;
      background: rgba(255, 253, 248, 0.58);
      box-shadow: var(--shadow-pressed);
    }

    .recite-panel {
      min-height: calc(100vh - 118px);
      display: flex;
      flex-direction: column;
      overflow: visible;
    }

    .recite-toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      padding: 20px 28px 10px;
      border-bottom: 0;
      background: transparent;
    }

    .mode-tabs {
      --active-index: 0;
      position: fixed;
      bottom: 18px;
      left: 50%;
      display: grid;
      grid-template-columns: repeat(5, minmax(64px, 1fr));
      gap: 5px;
      width: min(520px, calc(100% - 44px));
      margin: 0;
      padding: 5px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.86);
      box-shadow: 0 18px 38px rgba(146, 119, 92, 0.18), inset 0 1px 2px rgba(255, 255, 255, 0.84);
      backdrop-filter: blur(16px);
      transform: translateX(-50%);
      z-index: 6;
    }

    body[data-theme="dark"] .mode-tabs {
      background: rgba(55, 58, 70, 0.86);
      box-shadow: 0 18px 38px rgba(18, 21, 29, 0.3), inset 0 1px 2px rgba(255, 255, 255, 0.08);
    }

    body[data-theme="dark"] .mode-tabs::before { background: var(--accent); }
    body[data-theme="dark"] .mode-tabs button.active { color: var(--accent-ink); }

    .mode-tabs::before {
      content: "";
      position: absolute;
      z-index: 0;
      top: 5px;
      bottom: 5px;
      left: 5px;
      width: calc((100% - 10px) / 5);
      border-radius: 999px;
      background: linear-gradient(180deg, #f5dcb8, var(--accent));
      transform: translateX(calc(var(--active-index) * 100%));
      transition: transform var(--motion);
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.72), 0 8px 18px rgba(188, 148, 103, 0.18);
    }

    .mode-tabs button {
      position: relative;
      z-index: 1;
      min-width: 0;
      height: 38px;
      border: 0;
      border-radius: 999px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
      font-size: 13px;
      user-select: none;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color var(--motion), transform var(--motion);
    }

    .mode-tabs button.active {
      color: var(--accent-ink);
      font-weight: 650;
    }

    .recite-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .font-control {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 250px;
      padding: 10px 16px;
      border: 0;
      border-radius: 999px;
      background: rgba(255, 253, 248, 0.78);
      color: var(--subtle);
      font-size: 15px;
      font-weight: 650;
      user-select: none;
      box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.76), 0 10px 22px rgba(142, 120, 98, 0.09);
    }

    .font-control input {
      width: 160px;
      height: 18px;
      padding: 0;

        padding-top: calc(var(--switch-fixed-top) + var(--switch-fixed-height) + 12px) !important;
      }

      .topbar {
        justify-content: center !important;
        min-height: 48px !important;
        margin-bottom: 18px !important;
      }

      .top-actions {
        width: min(460px, 100%) !important;
        margin-left: 0 !important;
        justify-content: center !important;
      }
    }

    @media (max-width: 680px) {
      .shell {
        padding-top: calc(var(--switch-fixed-top) + var(--switch-fixed-height) + 10px) !important;
      }
    }

    .cache-card .btn {
      transform: none !important;
      transition: opacity var(--motion), background-color var(--motion), box-shadow var(--motion) !important;
      will-change: auto !important;
      -webkit-font-smoothing: antialiased;
    }

    .cache-card .btn:hover,
    .cache-card .btn:active,
    .cache-card .btn:focus-visible {
      transform: none !important;
    }

    .cache-card .btn.danger {
      min-width: 0 !important;
      width: 100% !important;
      height: 100% !important;
      align-self: stretch;
    }


    /* === V8 final fix: recite bottom haze stops at tabs top, help/tabs stay above haze === */

    /*
      层级目标：
      1. 底部模糊层只覆盖：屏幕底部 -> 底部层级切换条顶部
      2. 重点操作说明 .mode-help 永远在模糊层上方
      3. 底部层级切换条 .mode-tabs 永远在最上方
    */
    :root {
      /* 底部层级切换条离屏幕底部的距离 */
      --recite-tabs-bottom: max(14px, env(safe-area-inset-bottom));

      /*
        .mode-tabs 实际高度：
        桌面端：button 38px + padding 5px*2 + border 约 2px = 50px
      */
      --recite-tabs-height: 50px;

      /* 从屏幕底部到层级切换条顶部的距离 */
      --recite-tabs-top-from-bottom: calc(var(--recite-tabs-bottom) + var(--recite-tabs-height));

      /* 层级 */
      --recite-bottom-haze-z: 240;
      --recite-mode-help-z: 980;
      --recite-mode-tabs-z: 1000;
    }

    /* 小屏：mode-tabs button 通常是 36px，高度约 48px */
    @media (max-width: 680px) {
      :root {
        --recite-tabs-bottom: max(8px, env(safe-area-inset-bottom));
        --recite-tabs-height: 48px;
      }
    }

    /* 极窄屏：mode-tabs padding 4px，button 36px，高度约 46px */
    @media (max-width: 430px) {
      :root {
        --recite-tabs-height: 46px;
      }
    }

    /* 彻底禁用旧的底部模糊伪元素，避免它们盖住提示或切换条 */
    .recite-panel::after,
    body[data-page="recite"]::after {
      content: none !important;
      display: none !important;
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }

    /* 支持 :has 的浏览器里，也禁用 body:has(...) 的旧伪元素 */
    body:has(#reciteView.active)::after {
      content: none !important;
      display: none !important;
      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
    }

    /* 独立底部模糊层，默认隐藏 */
    .recite-bottom-haze {
      display: none;
      position: fixed !important;
      left: 0 !important;
      right: 0 !important;
      bottom: 0 !important;

      /*
        关键修复：
        模糊层最高只到 .mode-tabs 顶部，
        不再使用 --bottom-haze-height 那种过高的模糊区域。
      */
      height: var(--recite-tabs-top-from-bottom) !important;

      pointer-events: none !important;
      z-index: var(--recite-bottom-haze-z) !important;

      background: linear-gradient(
        0deg,
        rgba(238, 236, 234, 0.38) 0%,
        rgba(238, 236, 234, 0.18) 54%,
        rgba(238, 236, 234, 0) 100%
      ) !important;

      -webkit-backdrop-filter: blur(10px) saturate(1.04) !important;
      backdrop-filter: blur(10px) saturate(1.04) !important;

      -webkit-mask-image: linear-gradient(
        0deg,
        #000 0%,
        rgba(0, 0, 0, 0.82) 58%,
        rgba(0, 0, 0, 0) 100%
      ) !important;
      mask-image: linear-gradient(
        0deg,
        #000 0%,
        rgba(0, 0, 0, 0.82) 58%,
        rgba(0, 0, 0, 0) 100%
      ) !important;

      contain: paint;
    }

    /* 背诵页显示底部模糊层 */
    body[data-page="recite"] .recite-bottom-haze {
      display: block !important;
    }

    /* 另一种状态判断：当背诵 view active 时显示 */
    body:has(#reciteView.active) .recite-bottom-haze {
      display: block !important;
    }

    /* 深色模式底部模糊 */
    body[data-theme="dark"] .recite-bottom-haze {
      background: linear-gradient(
        0deg,
        rgba(21, 27, 36, 0.58) 0%,
        rgba(21, 27, 36, 0.26) 54%,
        rgba(21, 27, 36, 0) 100%
      ) !important;
    }

    /* 底部层级切换条：永远在底部模糊层上方 */
    .mode-tabs {
      position: fixed !important;
      bottom: var(--recite-tabs-bottom) !important;
      z-index: var(--recite-mode-tabs-z) !important;

      isolation: isolate !important;
      overflow: hidden !important;
      -webkit-clip-path: inset(0 round 999px) !important;
      clip-path: inset(0 round 999px) !important;

      opacity: 1 !important;
      filter: none !important;
      -webkit-filter: none !important;

      transform: translateX(-50%) translateZ(0) !important;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      will-change: transform;
    }

    /*
      重要：
      .mode-tabs::after 只保留玻璃高光，
      不能再承担底部大面积 blur。
    */
    .mode-tabs::after {
      content: "" !important;
      position: absolute !important;
      inset: 1px !important;
      z-index: 0 !important;
      border-radius: inherit !important;
      pointer-events: none !important;

      background:
        radial-gradient(circle at 18% 8%, rgba(255, 255, 255, 0.68), transparent 34%),
        linear-gradient(145deg, rgba(255, 255, 255, 0.24), transparent 46%, rgba(255, 255, 255, 0.12)) !important;

      -webkit-backdrop-filter: none !important;
      backdrop-filter: none !important;
      -webkit-mask-image: none !important;
      mask-image: none !important;

      mix-blend-mode: screen !important;
      opacity: 0.50 !important;
      transform: none !important;
      contain: paint;
    }

    body[data-theme="dark"] .mode-tabs::after {
      mix-blend-mode: normal !important;
      opacity: 0.22 !important;
    }

    /* 选中滑块在高光之上 */
    .mode-tabs::before {
      z-index: 1 !important;
    }

    /* 按钮文字在最上层，避免任何伪元素盖住文字 */
    .mode-tabs button {
      position: relative !important;
      z-index: 2 !important;

      opacity: 1 !important;
      filter: none !important;
      -webkit-filter: none !important;

      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.26);
    }

    body[data-theme="dark"] .mode-tabs button {
      text-shadow: none !important;
    }

    /*
      重点操作说明：
      放在底部层级切换条顶部之上，
      并且 z-index 高于底部模糊层。
    */
    .mode-help {
      position: fixed !important;
      left: 50% !important;
      bottom: calc(var(--recite-tabs-top-from-bottom) + 6px) !important;

      width: min(560px, calc(100vw - 28px)) !important;
      transform: translateX(-50%) translateZ(0) !important;

      z-index: var(--recite-mode-help-z) !important;

      opacity: 1;
      filter: none !important;
      -webkit-filter: none !important;

      pointer-events: none !important;
      transition: opacity var(--motion), transform var(--motion);
    }

    /* 保留原本的隐藏动画 */
    .mode-help.is-hidden {
      opacity: 0 !important;
      transform: translateX(-50%) translateY(8px) translateZ(0) !important;
    }

    /* 小屏提示稍微贴近切换条 */
    @media (max-width: 680px) {
      .mode-help {
        width: calc(100% - 18px) !important;
        bottom: calc(var(--recite-tabs-top-from-bottom) + 4px) !important;
        padding: 8px 10px;
        border-radius: 16px;
        font-size: 11.5px;
      }
    }

    /* Toast 避开底部说明和层级切换条 */
    body[data-page="recite"] .toast,
    body:has(#reciteView.active) .toast {
      bottom: calc(var(--recite-tabs-top-from-bottom) + 58px) !important;
    }

    /* 不支持 :has 的浏览器 fallback */
    @supports not selector(body:has(*)) {
      #reciteView:not(.active) .recite-bottom-haze {
        display: none !important;
      }

      #reciteView.active .recite-bottom-haze {
        display: block !important;
      }

      #reciteView.active .mode-help {
        z-index: var(--recite-mode-help-z) !important;
      }

      #reciteView.active .mode-tabs {
        z-index: var(--recite-mode-tabs-z) !important;
      }
    }

    /* 不支持 backdrop-filter 时，保留淡色渐变，不做模糊 */
    @supports not ((backdrop-filter: blur(1px)) or (-webkit-backdrop-filter: blur(1px))) {
      .recite-bottom-haze {
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
      }
    }

    /* 用户减少透明效果时，不做底部模糊 */
    @media (prefers-reduced-transparency: reduce) {
      .recite-bottom-haze,
      .mode-help {
        -webkit-backdrop-filter: none !important;
        backdrop-filter: none !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <nav class="page-switch" id="pageSwitch" data-page="cards" aria-label="页面切换">
        <button id="cardsTab" class="active" type="button" data-page="cards">卡片</button>
        <button id="configTab" type="button" data-page="config">配置</button>
        <button id="reciteTab" type="button" data-page="recite">背诵</button>
      </nav>
      <div class="top-actions">
        <button class="theme-toggle" id="themeToggle" type="button" aria-label="切换深色或浅色模式" title="切换深色或浅色模式">
          <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
            <path d="M12 3v2"></path>
            <path d="M12 19v2"></path>
            <path d="m4.22 4.22 1.42 1.42"></path>
            <path d="m18.36 18.36 1.42 1.42"></path>
            <path d="M3 12h2"></path>
            <path d="M19 12h2"></path>
            <path d="m4.22 19.78 1.42-1.42"></path>
            <path d="m18.36 5.64 1.42-1.42"></path>
            <circle cx="12" cy="12" r="4"></circle>
          </svg>
        </button>
        <div class="status" id="status" data-tone="ok" aria-live="polite">
          <span class="status-dot"></span>
          <span id="statusText">准备就绪</span>
        </div>
      </div>
    </header>

    <section class="view active" id="cardsView">
      <section class="panel cards-wrap">
        <div class="panel-head stack">
          <h2 class="panel-title">缓存的背诵卡片</h2>
          <span class="hint" id="cardsSummary">浏览器内自动缓存当前语料和标注</span>
        </div>
        <div class="panel-body">
          <div class="cards-list" id="cardsList" aria-label="缓存卡片"></div>
          <div class="cards-empty" id="cardsEmpty" hidden>还没有缓存卡片。生成或解析标注后会自动加入这里。</div>
          <div class="cards-actions">
            <button class="btn primary-wide" id="exportCards" type="button">导出文件</button>
            <button class="btn secondary" id="importCards" type="button">导入文件</button>
            <button class="btn danger" id="clearCards" type="button">清除缓存</button>
          </div>
          <input id="importCardsFile" type="file" accept="application/json,.json" hidden>
        </div>
      </section>
    </section>

    <section class="view" id="configView">
      <div class="config-grid">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">语料与 API</h2>
          </div>
          <div class="panel-body">
            <label>
              源语料
              <textarea id="sourceText" spellcheck="false"></textarea>
            </label>

            <div class="api-mode" id="apiModeTabs" data-api-mode="developer" aria-label="API 模式">
              <button class="active" type="button" data-api-mode="developer">开发者的 API</button>
              <button type="button" data-api-mode="custom">自定义 DS API</button>

            <div class="api-custom-fields" id="customApiFields" hidden>
              <label>
                DeepSeek API Key
                <span class="key-field">
                  <input id="apiKey" type="password" autocomplete="off" placeholder="sk-...">
                  <button class="icon-button" id="toggleKey" type="button" aria-label="显示或隐藏 API key" title="显示或隐藏 API key">
                    <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" aria-hidden="true">
                      <path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7-10-7-10-7Z"></path>
                      <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                  </button>
                </span>
              </label>

              <label>
                模型
                <select id="modelName">
                  <option value="deepseek-v4-flash">deepseek v4 flash (1M)</option>
                  <option value="deepseek-v4-pro">Deepseek v4 pro (1M)</option>

              <label>
                API 端点
                <input id="apiEndpoint" type="text" value="https://api.deepseek.com/chat/completions">

            <div class="button-row">

        <section class="panel">

              <div class="protocol-item"><span class="swatch core"></span><span><code>⟬...⟭</code> 一层核心</span></div>
              <div class="protocol-item"><span class="swatch broad"></span><span><code>⟪...⟫</code> 二层扩展</span></div>

    <section class="view" id="reciteView">

            <button class="btn secondary" id="resetMode" type="button">重置</button>

        <article class="reader" id="reader" aria-label="背诵内容"></article>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = "beisong-wanxing-settings";
    const CARDS_STORAGE_KEY = "beisong-wanxing-cards";
    const DEVELOPER_API_KEY = "";
    const DEVELOPER_API_ENDPOINT = "https://api.deepseek.com/chat/completions";
    const DEVELOPER_MODEL = "deepseek-v4-flash";
    const MARK_KEEP_OPEN = "\u27e6";
    const MARK_KEEP_CLOSE = "\u27e7";
    const MARK_CORE_OPEN = "\u27ec";
    const MARK_CORE_CLOSE = "\u27ed";
    const MARK_BROAD_OPEN = "\u27ea";
    const MARK_BROAD_CLOSE = "\u27eb";

    const directMarkPrompt = [
      "你是背诵完形材料的语义标注器，只返回 JSON，不返回 Markdown。",
      "输入会给你 source 和 chunks。chunks 是本地已经稳定切好的词块，每个词块有 id、text、lang、line、defaultKeep。",
      "不要改写、删除、添加原文，不要输出全文，不要插入 |。",
      "只返回这个 JSON 结构：{\"core\":[[startId,endId]],\"broad\":[[startId,endId]],\"priority\":[{\"id\":数字,\"score\":1到100,\"reason\":\"简短理由\"}],\"keep\":[[startId,endId]],\"notes\":\"简短说明\"}。",
      "你要像命题老师设计填空题一样判断：哪里最可能被挖空、哪里最能区分是否真的背会，才进 core 或高分 priority。",
      "core 是第一层高概率考点，只放最像填空题答案的硬信息：①年份/数字/比例/排序本体；②人物、地点、机构、作品、事件、朝代、国家等专名；③理论、概念、制度、政策、公式、模型、术语名；④因果链、比较关系、定义判断中的原因、结果、对象、归属、结论关键词。",
      "broad 是第二层扩展考点，放次高概率答案：限定条件、分类项、配对项、关键动作、关系谓语、重要修饰语、支撑性事实。broad 用来辅助回忆句意，但仍必须有考点价值。",
      "priority 必须列出 24-72 个最值得挖空的单个词块 id；90-100 分只给数字、专名、术语、事件、理论、公式、结论核心词；70-89 分给次级但仍可能考的支撑词；低于 60 分的普通词不要列入。网页会优先用 priority 选第一层。",
      "priority 的理由必须说明它为什么像考试答案，例如‘年份数字’‘专有名词’‘理论名称’‘定义对象’‘因果关键结果’‘比较配对项’；不要因为词里包含‘并/和/但/与/或’等字就把它当连接词或保留项。",
      "只在词块本身就是独立逻辑连接词，并且上下文确实表达并列、转折、选择、递进、因果时，才可把‘并、和、但、与、或、以及、且、however、but、and、or’视为逻辑词；如果这些字只是词内部字符或固定名称的一部分，例如‘并发、并行、和谐、共和国、但丁、或许、或者说’，绝不能因此 keep 或高分。",
      "keep 只用于标题编号、列表符号、箭头、纯结构符号、标点和必须原样显示的排版符号。普通年份、世纪、年代、金额、正文数字、学科术语、专名都不是结构保护。",
      "时间与数字表达必须优先标记数字本体：‘20世纪’优先给‘20’高分，不要只标‘世纪’；‘1949年’优先标‘1949’；‘21st century’优先标‘21st’；‘三十年’优先标‘三十’。‘世纪、年代、年、月、日、century、year’这类单位词单独出现时通常不是核心答案。",
      "遇到数字+单位被切成相邻词块时，priority 必须让数字词块分数高于单位词块；除非单位词本身是专有概念的一部分，否则不要只把单位词放进 core。",
      "遇到概念词被切成‘前缀+后缀’时，优先选择能限定概念的前缀或完整术语，不要只选后缀：例如‘民族资本主义’优先‘民族资本主义’或‘资本’，不要只选‘主义’；‘科举制度’优先‘科举’或完整短语，不要只选‘制度’。",
      "遇到短语被切成多个词块时，只挑最能代表答案的 1-2 个锚点词：例如‘20世纪初的民族资本主义发展’优先选‘20’‘民族资本主义’，不要选‘世纪’‘初的’‘发展’这类弱词。",
      "不要把‘重要、不同、主要、方面、进行、具有、出现、形成、发展、影响、作用、问题、情况、内容、特点、意义、原因、结果、措施、背景’等泛化词单独作为高分答案；只有它们与专名/概念组成完整考点时才可考虑。",
      "不要为了凑比例把普通形容词、副词、助词、介词、语气词、泛动词标进 core；第一层宁可少而准，第二层再覆盖可帮助回忆的扩展考点。",
      "core 和 broad 要在不同段落、不同语言中适度分布，但分布均匀不能牺牲考点质量；如果某段全是虚词或背景套话，可以少标。",
      "跨中文、英文、日文混合材料时，同一原则适用：优先数字、专名、术语、概念、事件、结论，不要把重点集中在单一语言。",
      "范围必须使用已有 id，startId <= endId，不要跨换行，不要重叠；core 与 broad 尽量不要连续包一大串，相邻高价值词可分开列 priority。"
    ].join("\n");

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function setStatus(message, tone = "ok") {
      els.status.dataset.tone = tone;
      els.status.dataset.busy = "false";
      els.status.style.setProperty("--progress", "0%");

    function setProgress(message, percent, tone = "ok") {

    function currentMaterialSignature() {
      return hashText(`${els.sourceText.value.trim()}\n---\n${els.markedEditor.textContent.trim()}`);
    }

    function syncReciteHelpVisibility() {
      if (!els.modeHelp) return;
      els.modeHelp.classList.toggle("is-hidden", state.reciteHelpDismissed || !state.units.length);
      document.body.classList.toggle("recite-help-hidden", state.reciteHelpDismissed || !state.units.length);
    }

    function resetReciteHelpForCurrentMaterial() {
      state.reciteHelpSignature = currentMaterialSignature();
      state.reciteHelpDismissed = false;
      syncReciteHelpVisibility();
    }

    function dismissReciteHelp() {
      if (state.page !== "recite" || state.reciteHelpDismissed) return;
      state.reciteHelpDismissed = true;
      syncReciteHelpVisibility();
    }

    function hashText(text) {
      let hash = 2166136261;
      for (let i = 0; i < text.length; i += 1) {
        hash ^= text.charCodeAt(i);
        hash = Math.imul(hash, 16777619);
      }
      return (hash >>> 0).toString(36);
    }

    function formatDateTime(timestamp) {
      if (!timestamp) return "未背诵";
      const date = new Date(timestamp);
      const pad = (value) => String(value).padStart(2, "0");
      return `${date.getFullYear()}年${date.getMonth() + 1}月${date.getDate()}日 ${pad(date.getHours())}:${pad(date.getMinutes())}`;
    }

    function formatRelativeTime(timestamp) {
      if (!timestamp) return "";
      const diff = Math.max(0, Date.now() - timestamp);
      const minutes = Math.floor(diff / 60000);
      if (minutes < 1) return "刚刚";
      if (minutes < 60) return `${minutes} min 前`;
      const hours = Math.floor(minutes / 60);
      if (hours < 24) return `${hours} h ${minutes % 60} min 前`;
      const days = Math.floor(hours / 24);
      return `${days} d 前`;
    }

    function cardExcerpt(source, markedText) {
      const text = (source || markedText || "")
        .replace(/[⟦⟧⟬⟭⟪⟫|]/g, "")
        .replace(/\s+/g, " ")
        .trim();
      return text ? `${text.slice(0, 52)}${text.length > 52 ? "……" : ""}` : "未命名卡片";
    }

    function normalizeCard(raw) {
      if (!raw || typeof raw !== "object") return null;
      const sourceText = typeof raw.sourceText === "string" ? raw.sourceText : "";
      const markedText = typeof raw.markedText === "string" ? raw.markedText : "";
      if (!sourceText && !markedText) return null;
      const signature = raw.signature || hashText(`${sourceText}\n---\n${markedText}`);
      const now = Date.now();
      return {
        id: typeof raw.id === "string" && raw.id ? raw.id : `card-${signature}-${now.toString(36)}`,
        signature,
        title: typeof raw.title === "string" && raw.title ? raw.title : cardExcerpt(sourceText, markedText),
        sourceText,
        markedText,
        notes: typeof raw.notes === "string" ? raw.notes : "",
        source: typeof raw.source === "string" ? raw.source : "ai",
        createdAt: Number(raw.createdAt) || now,
        updatedAt: Number(raw.updatedAt) || now,
        lastRecitedAt: Number(raw.lastRecitedAt) || 0
      };
    }

    function saveCards() {
      localStorage.setItem(CARDS_STORAGE_KEY, JSON.stringify(state.cards));
      renderCards();
    }

    function loadCards() {
      try {
        const parsed = JSON.parse(localStorage.getItem(CARDS_STORAGE_KEY) || "[]");
        state.cards = Array.isArray(parsed) ? parsed.map(normalizeCard).filter(Boolean) : [];
      } catch {
        state.cards = [];
        localStorage.removeItem(CARDS_STORAGE_KEY);
      }
      renderCards();
    }

    function cacheCurrentCard(source = "ai") {
      const sourceText = els.sourceText.value.trim();
      const markedText = els.markedEditor.textContent.trim();
      if (!sourceText && !markedText) return null;
      const signature = hashText(`${sourceText}\n---\n${markedText}`);
      const existing = state.cards.find((card) => card.signature === signature);
      const now = Date.now();
      const card = normalizeCard({
        ...(existing || {}),
        signature,
        sourceText,
        markedText,
        notes: els.notesText.textContent || "",
        source,
        title: cardExcerpt(sourceText, markedText),
        updatedAt: now
      });
      if (!card) return null;
      if (existing) Object.assign(existing, card, { id: existing.id, createdAt: existing.createdAt, lastRecitedAt: existing.lastRecitedAt || 0 });
      else state.cards.unshift(card);
      state.activeCardId = existing ? existing.id : card.id;
      saveCards();
      return existing || card;
    }

    function renderCards() {
      if (!els.cardsList) return;
      const sorted = [...state.cards].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));
      els.cardsSummary.textContent = sorted.length ? `共 ${sorted.length} 张，浏览器内自动保存` : "浏览器内自动缓存当前语料和标注";
      els.cardsEmpty.hidden = sorted.length > 0;
      els.cardsList.innerHTML = sorted.map((card) => {
        const last = card.lastRecitedAt ? `${formatDateTime(card.lastRecitedAt)}（${formatRelativeTime(card.lastRecitedAt)}）` : "还没有背诵记录";
        return `
          <article class="cache-card" data-card-id="${escapeHtml(card.id)}">
            <button class="btn danger" type="button" data-card-action="delete">删除</button>
            <div class="cache-card-main">
              <div class="cache-title">${escapeHtml(card.title || cardExcerpt(card.sourceText, card.markedText))}</div>
              <div class="cache-meta">上次背诵时间：<br>${escapeHtml(last)}</div>
            </div>
            <button class="btn subtle" type="button" data-card-action="config">配置</button>
            <button class="btn" type="button" data-card-action="recite">背诵</button>
          </article>
        `;
      }).join("");
    }

    function loadCardIntoEditor(card) {
      if (!card) return;
      els.sourceText.value = card.sourceText || "";
      state.markedText = card.markedText || "";
      els.markedEditor.textContent = state.markedText;
      els.notesText.textContent = card.notes || "可编辑后重新解析";
      state.units = state.markedText ? parseMarkedText(state.markedText) : [];
      state.units.forEach((unit) => { unit.source = card.source || "ai"; });
      state.activeCardId = card.id;
      applyMode();
      resetReciteHelpForCurrentMaterial();
    }

    function markCardRecited(card) {
      if (!card) return;
      card.lastRecitedAt = Date.now();
      card.updatedAt = Date.now();
      saveCards();
    }

    function exportCardsFile() {
      if (!state.cards.length) {
        toast("没有可导出的缓存");
        return;
      }
      const payload = {
        type: "beisong-wanxing-cards",
        version: 1,
        exportedAt: new Date().toISOString(),
        cards: state.cards
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `beisong-cards-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
      toast("缓存文件已导出");
    }

    async function importCardsFile(file) {
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const incoming = Array.isArray(parsed) ? parsed : Array.isArray(parsed.cards) ? parsed.cards : [];
        const existing = new Set(state.cards.map((card) => card.signature));
        const additions = incoming.map(normalizeCard).filter(Boolean).filter((card) => {
          if (existing.has(card.signature)) return false;
          existing.add(card.signature);
          return true;
        });
        if (additions.length) {
          state.cards = [...additions, ...state.cards];
          saveCards();
        }
        toast(additions.length ? `已导入 ${additions.length} 张新卡片` : "没有发现新的不重复卡片");
      } catch {
        toast("导入失败，请选择有效 JSON 文件");
      } finally {
        els.importCardsFile.value = "";
      }
    }

    function setApiMode(mode, shouldSave = true) {

      els.apiModeTabs.querySelectorAll("button").forEach((button) => {

    function switchPage(page) {
      state.page = page;
      document.body.dataset.page = page;

      els.configTab.classList.toggle("active", page === "config");

      els.cardsView.classList.toggle("active", page === "cards");

      if (page === "recite" && !state.units.length) {
        renderReader();
      }
      if (page === "recite" && state.activeCardId) {
        markCardRecited(state.cards.find((card) => card.id === state.activeCardId));
      }
      if (page === "recite") syncReciteHelpVisibility();
    }

    function splitMarkedSegment(raw, type, units) {
      const parts = raw.includes("|")
        ? raw.split("|").map((part) => ({ text: part, kind: /^\s+$/u.test(part) ? "space" : "raw" }))
        : segmentForAlternatingMask(raw);
      for (const partInfo of parts) {
        const part = typeof partInfo === "string" ? partInfo : partInfo.text;
        if (part === "") continue;
        if (part.includes("\n")) {
          const pieces = part.split(/(\n+)/);
          for (const piece of pieces) {
            if (!piece) continue;
            if (/^\n+$/.test(piece)) {
              units.push({
                id: units.length,
                text: piece,
                type: "linebreak",
                hidden: false,
                manual: false,
                important: false,
                source: "ai"
              });
            } else {
              splitMarkedSegment(piece, type, units);
            }
          }
          continue;
        }
        const kind = typeof partInfo === "string" ? "raw" : partInfo.kind;
        const protectedToken = kind === "keep" || kind === "plain" || isPunctuationToken(part) || isStructureToken(part) || isExplicitLogicToken(part);
        const normalizedType = type !== "keep" && isWeakFunctionToken(part) ? "plain" : type;
        if (kind === "space" || /^\s+$/u.test(part)) {
          units.push({
            id: units.length,
            text: part,
            type: "space",
            hidden: false,
            manual: false,
            important: false,
            source: "ai"
          });
          continue;
        }
        units.push({
          id: units.length,
          text: part,
          type: protectedToken ? "keep" : normalizedType,
          hidden: false,
          manual: false,
          important: false,
          source: "ai"
        });
      }
    }

    function findNextSpecial(text, start) {
      const candidates = ["⟦", "⟬", "⟪"]
        .map((token) => text.indexOf(token, start))
        .filter((pos) => pos !== -1);
      return candidates.length ? Math.min(...candidates) : text.length;
    }

    function parseMarkedText(markedText) {
      const units = [];
      let index = 0;

      while (index < markedText.length) {
        if (markedText.startsWith("⟦", index)) {
          const end = markedText.indexOf("⟧", index + 1);
          if (end === -1) {
            splitMarkedSegment(markedText.slice(index), "plain", units);
            break;
          }
          splitMarkedSegment(markedText.slice(index + 1, end), "keep", units);
          index = end + 1;
          continue;
        }

        if (markedText.startsWith("⟬", index)) {
          const end = markedText.indexOf("⟭", index + 1);
          if (end === -1) {
            splitMarkedSegment(markedText.slice(index), "plain", units);
            break;
          }
          splitMarkedSegment(markedText.slice(index + 1, end), "core", units);
          index = end + 1;
          continue;
        }

        if (markedText.startsWith("⟪", index)) {
          const end = markedText.indexOf("⟫", index + 1);
          if (end === -1) {
            splitMarkedSegment(markedText.slice(index), "plain", units);
            break;
          }
          splitMarkedSegment(markedText.slice(index + 1, end), "broad", units);
          index = end + 1;
          continue;
        }

        const next = findNextSpecial(markedText, index);
        splitMarkedSegment(markedText.slice(index, next), "plain", units);
        index = next;
      }

      return units;
    }

    function defaultHidden(unit) {
      if (unit.type === "keep" || unit.type === "space" || unit.type === "linebreak") return false;
      if (state.mode === "none") return false;
      if (state.mode === "level1") return unit.type === "core";
      if (state.mode === "level2") {
        if (unit.source === "alternate") return unit.type === "broad";
        return unit.type === "core" || unit.type === "broad";
      }
      if (state.mode === "important") return unit.important;
      if (state.mode === "all") return true;
      return false;
    }

    function applyMode() {
      for (const unit of state.units) {
        unit.hidden = defaultHidden(unit);
        unit.manual = false;
      }
      renderReader();
    }

    function needsWordSpace(left, right) {
      const a = left.trim();
      const b = right.trim();
      if (!a || !b) return false;
      return /[A-Za-z0-9]/.test(a[a.length - 1]) && /[A-Za-z0-9]/.test(b[0]);
    }

    function unitClass(unit) {
      const classes = ["unit"];
      if (unit.type === "keep") classes.push("keep");
      if (unit.type === "space") classes.push("space");
      if (unit.type !== "keep" && unit.type !== "space" && unit.type !== "linebreak") classes.push("maskable", unit.type);
      if (unit.important) classes.push("important");
      if (unit.hidden) classes.push("hidden");
      if (unit.manual && !unit.hidden) classes.push("revealed");
      if (unit.manual && unit.hidden) classes.push("manual-hidden");
      return classes.join(" ");
    }

    function renderReader() {
      if (!state.units.length) {
        els.reader.innerHTML = `<div class="empty-reader">还没有可背诵内容。请回到配置页输入语料并生成或解析标注。</div>`;
        return;
      }

      const html = state.units.map((unit, index) => {
        if (unit.type === "linebreak") {
          return "<br>".repeat(Math.max(1, unit.text.length));
        }
        const previous = state.units[index - 1];
        const gap = index > 0 && previous?.type !== "space" && unit.type !== "space" && needsWordSpace(previous.text, unit.text) ? " " : "";
        const data = unit.type === "keep" || unit.type === "space" || unit.type === "linebreak" ? "" : ` data-id="${unit.id}"`;
        return `${gap}<span class="${unitClass(unit)}"${data}>${escapeHtml(unit.text)}</span>`;
      }).join("");

      els.reader.innerHTML = html;
    }

    function loadMarkedText(markedText, message, notes = "", source = "ai") {
      state.markedText = markedText.trim();
      els.markedEditor.textContent = state.markedText;
      els.notesText.textContent = notes || "可编辑后重新解析";
      state.units = parseMarkedText(state.markedText);
      state.units.forEach((unit) => {
        unit.source = source;
      });
      applyMode();
      cacheCurrentCard(source);
      resetReciteHelpForCurrentMaterial();
      setStatus(message);
    }

    function parseEditor() {
      const text = els.markedEditor.textContent.trim();
      if (!text) {
        setStatus("没有可解析的标注结果", "warn");
        toast("请先生成或粘贴标注结果");
        return false;
      }
      loadMarkedText(text, "已解析标注结果");
      return true;
    }

    function normalizeSourceText(source) {
      return source
        .replace(/\r\n?/g, "\n")
        .replace(/```[\s\S]*?```/g, (block) => block.replace(/```[^\n]*\n?|\n?```/g, ""))
        .replace(/^\s{0,3}#{1,6}\s+/gm, "")
        .replace(/^\s{0,3}>\s?/gm, "")
        .replace(/\*\*([^*]+)\*\*/g, "$1")
        .replace(/__([^_]+)__/g, "$1")
        .replace(/\*([^*]+)\*/g, "$1")
        .replace(/_([^_]+)_/g, "$1")
        .replace(/\[([^\]]+)\]\([^)]+\)/g, "$1")
        .replace(/<[^>]+>/g, "")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n{3,}/g, "\n\n")
        .trim();
    }

    function mockMarkedText(source) {
      const text = normalizeSourceText(source);
      if (!text) return "";
      let maskIndex = 0;
      return text.split(/\n/).map((line) => segmentForAlternatingMask(line).map((token) => {
        if (token.kind === "space") return token.text;
        if (token.kind === "keep") return `⟦${token.text}⟧`;
        if (token.kind === "plain" || isWeakFunctionToken(token.text) || isWeakCjkFunctionToken(token.text)) return token.text;
        const wrapped = maskIndex % 2 === 0 ? `⟬${token.text}⟭` : `⟪${token.text}⟫`;
        maskIndex += 1;

      }
      const coreIds = new Set(corePicked.map((chunk) => chunk.id));
      const broadBlocked = new Set(coreIds);
      const broadPicked = pickDistributed(maskable, Math.max(0, totalTarget - coreIds.size), scores, broadBlocked, {
        radius: 2,
        allowRelaxed: true,
        allowFallbackClose: true,
        orderIndex,
        contextChunks: chunks
      });
      const broadIds = new Set(broadPicked.map((chunk) => chunk.id));
      return chunks.map((chunk) => {
        if (chunk.label === "keep") return chunk;
        if (coreIds.has(chunk.id)) return { ...chunk, label: "core" };
        if (broadIds.has(chunk.id)) return { ...chunk, label: "broad" };
        return { ...chunk, label: "plain" };
      });
    }

    function chunksToMarkedText(chunks) {
      let text = "";
      let open = "";
      const openMark = { core: MARK_CORE_OPEN, broad: MARK_BROAD_OPEN };
      const closeMark = { core: MARK_CORE_CLOSE, broad: MARK_BROAD_CLOSE };
      for (const chunk of chunks) {
        const label = chunk.label;
        const wrappable = label === "core" || label === "broad";
        if (!wrappable && open) {
          text += closeMark[open];
          open = "";
        }
        if (wrappable && open !== label) {
          if (open) text += closeMark[open];
          text += openMark[label];
          open = label;
        }
        text += chunk.text;
      }
      if (open) text += closeMark[open];
      return text;
    }

    function validateMarkedText(markedText, source) {
      const issues = [];
      const units = parseMarkedText(markedText);
      const visibleUnits = units.filter((unit) => unit.text.trim() && unit.type !== "keep" && unit.type !== "space" && unit.type !== "linebreak");
      const core = visibleUnits.filter((unit) => unit.type === "core").length;
      const broad = visibleUnits.filter((unit) => unit.type === "broad").length;
      const keep = units.filter((unit) => unit.type === "keep").length;
      const sourceDenseLength = source.replace(/\s/g, "").length;
      const unitRatio = sourceDenseLength ? visibleUnits.length / sourceDenseLength : 0;
      const coreRatio = visibleUnits.length ? core / visibleUnits.length : 0;
      const totalRatio = visibleUnits.length ? (core + broad) / visibleUnits.length : 0;
      const longestUnit = visibleUnits.reduce((max, unit) => Math.max(max, unit.text.trim().length), 0);

      if (visibleUnits.length < 8 && sourceDenseLength >= 20) issues.push("切分单位过少");
      if (visibleUnits.length >= 8 && coreRatio < 0.28) issues.push("第一层标注太少");
      if (visibleUnits.length >= 8 && totalRatio < 0.58) issues.push("第二层合计标注太少");
      if (visibleUnits.length >= 8 && coreRatio > 0.43) issues.push("第一层标注过多");
      if (visibleUnits.length >= 8 && totalRatio > 0.78) issues.push("第二层合计标注过多");
      if (keep > Math.max(12, Math.ceil(units.length * 0.34))) issues.push("结构保护过多");

      return {
        ok: issues.length === 0,
        issues,
        ratios: { core: coreRatio, total: totalRatio },
        unitCount: visibleUnits.length
      };
    }

    function extractJsonContent(raw) {
      const trimmed = raw.trim();
      if (trimmed.startsWith("```")) {
        return trimmed
          .replace(/^```(?:json)?\s*/i, "")
          .replace(/\s*```$/i, "")
          .trim();
      }
      return trimmed;
    }

    async function callDeepSeekJson(endpoint, apiKey, payload) {
      const response = await fetch(endpoint, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${apiKey}`
        },
        body: JSON.stringify(payload)
      });

      if (!response.ok) {
        const errorText = await response.text();
        throw new Error(`HTTP ${response.status}${errorText ? `：${errorText.slice(0, 180)}` : ""}`);
      }

      const data = await response.json();
      const choice = data.choices && data.choices[0];
      const finishReason = choice && choice.finish_reason;
      if (finishReason === "length") {
        throw new Error("模型输出因长度限制被截断，请缩短语料或分段生成");
      }

      const content = choice && choice.message && choice.message.content;
      if (!content) throw new Error("DeepSeek 返回为空");

      try {
        return JSON.parse(extractJsonContent(content));
      } catch {
        throw new Error("DeepSeek 返回内容不是有效 JSON");
      }
    }

    async function generateWithDeepSeek() {
      const source = normalizeSourceText(els.sourceText.value);
      const apiMode = els.apiModeTabs.dataset.apiMode || "developer";
      const apiKey = apiMode === "developer" ? DEVELOPER_API_KEY : els.apiKey.value.trim();
      const endpoint = apiMode === "developer"
        ? DEVELOPER_API_ENDPOINT
        : (els.apiEndpoint.value.trim() || "https://api.deepseek.com/chat/completions");
      const model = apiMode === "developer" ? DEVELOPER_MODEL : (els.modelName.value || "deepseek-v4-flash");

      if (!source) {
        setStatus("缺少源语料", "warn");
        toast("请先输入源语料");
        return;
      }

      if (!apiKey) {
        setStatus(apiMode === "developer" ? "开发者 API 尚未配置" : "缺少 DeepSeek API key", "warn");
        toast(apiMode === "developer" ? "请先在 HTML 中写入开发者 API key" : "请先填写 API key");
        return;
      }

      saveSettings();
      els.generateApi.disabled = true;
      setProgress("正在清理语料并切分词块", 18);
      const chunks = buildLocalChunks(source);
      setProgress("正在调用 DeepSeek 判断核心信息", 42);

      const payload = {
        model,
        messages: [
          { role: "system", content: directMarkPrompt },
          {
            role: "user",
            content: JSON.stringify({
              source,
              chunks: compactChunksForAI(chunks)
            })
          }
        ],
        stream: false,
        temperature: 0.1,
        thinking: { type: "disabled" },
        response_format: { type: "json_object" }
      };

      try {
        const parsed = await callDeepSeekJson(endpoint, apiKey, payload);
        setProgress("正在按比例和位置重排遮盖", 76);
        const balancedChunks = applyBalancedLabels(chunks, parsed);
        const markedText = chunksToMarkedText(balancedChunks);
        let validation = validateMarkedText(markedText, source);

        const note = `已校验：一层 ${Math.round(validation.ratios.core * 100)}%，二层合计 ${Math.round(validation.ratios.total * 100)}%，词元 ${validation.unitCount}${validation.ok ? "" : "，建议检查标注结果"}`;
        loadMarkedText(markedText, "已生成标注，已进入背诵页", parsed.notes ? `${parsed.notes}；${note}` : note);
        finishProgress(`已生成：一层 ${Math.round(validation.ratios.core * 100)}%，二层 ${Math.round(validation.ratios.total * 100)}%`);
        switchPage("recite");
      } catch (error) {
        setStatus(`生成失败：${error.message}`, "error");
        toast("生成失败，请查看状态栏");
      } finally {
        els.generateApi.disabled = false;
      }
    }

    function setMode(mode) {
      state.mode = mode;
      const buttons = Array.from(els.modeTabs.querySelectorAll("button"));
      buttons.forEach((button) => {
        button.classList.toggle("active", button.dataset.mode === mode);
      });
      els.modeTabs.style.setProperty("--active-index", Math.max(0, buttons.findIndex((button) => button.dataset.mode === mode)));
      applyMode();
    }

    function toggleUnitByElement(element, hiddenValue) {
      const unitElement = element.closest(".unit[data-id]");
      if (!unitElement) return;
      const id = Number(unitElement.dataset.id);
      if (state.touchedDuringDrag.has(id)) return;
      const unit = state.units[id];
      if (!unit || unit.type === "keep") return;
      unit.hidden = typeof hiddenValue === "boolean" ? hiddenValue : !unit.hidden;
      unit.manual = true;
      state.touchedDuringDrag.add(id);
      renderReader();
    }

    function toggleImportantByElement(element, importantValue) {
      const unitElement = element.closest(".unit[data-id]");
      if (!unitElement) return;
      const id = Number(unitElement.dataset.id);
      if (state.touchedDuringDrag.has(id)) return;
      const unit = state.units[id];
      if (!unit || unit.type === "keep") return;
      unit.important = typeof importantValue === "boolean" ? importantValue : !unit.important;
      if (state.mode === "important") {
        unit.hidden = unit.important;
      }
      state.touchedDuringDrag.add(id);
      renderReader();
    }

    function finishPointerGesture(event) {
      if (state.longPressTimer) {
        window.clearTimeout(state.longPressTimer);
        state.longPressTimer = 0;
      }
      if (event && state.dragging) event.preventDefault();
      if (event && state.markDragging) event.preventDefault();
      state.dragging = false;
      state.markDragging = false;
      state.longPressFired = false;
      state.pointerStart = null;
      state.scrollingReader = false;
      state.touchedDuringDrag.clear();
      clearSelection();
    }

    function clearSelection() {
      const selection = window.getSelection && window.getSelection();
      if (selection && selection.removeAllRanges) selection.removeAllRanges();
    }

    els.pageSwitch.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-page]");
      if (!button) return;
      switchPage(button.dataset.page);
    });

    els.backConfig?.addEventListener("click", () => switchPage("config"));
    els.parseAndRecite.addEventListener("click", () => {
      if (parseEditor()) switchPage("recite");
    });

    els.cardsList.addEventListener("click", (event) => {
      const actionButton = event.target.closest("button[data-card-action]");
      if (!actionButton) return;
      const cardElement = actionButton.closest(".cache-card");
      const card = state.cards.find((item) => item.id === cardElement?.dataset.cardId);
      if (!card) return;
      const action = actionButton.dataset.cardAction;
      if (action === "delete") {
        state.cards = state.cards.filter((item) => item.id !== card.id);
        if (state.activeCardId === card.id) state.activeCardId = "";
        saveCards();
        toast("已删除卡片");
        return;
      }
      loadCardIntoEditor(card);
      if (action === "config") {
        switchPage("config");
      } else if (action === "recite") {
        switchPage("recite");
      }
    });

    els.exportCards.addEventListener("click", exportCardsFile);
    els.importCards.addEventListener("click", () => els.importCardsFile.click());
    els.importCardsFile.addEventListener("change", () => importCardsFile(els.importCardsFile.files[0]));
    els.clearCards.addEventListener("click", () => {
      if (!state.cards.length) {
        toast("没有可清除的缓存");
        return;
      }
      if (!window.confirm("确定清除所有缓存卡片吗？")) return;
      state.cards = [];
      state.activeCardId = "";
      saveCards();
      toast("缓存已清除");
    });

    els.themeToggle.addEventListener("click", toggleTheme);
    els.apiKey.addEventListener("input", saveSettings);
    els.modelName.addEventListener("input", saveSettings);
    els.apiEndpoint.addEventListener("input", saveSettings);
    els.fontSizeControl.addEventListener("input", () => setReaderFontSize(els.fontSizeControl.value));

    els.apiModeTabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-api-mode]");
      if (!button) return;
      setApiMode(button.dataset.apiMode);
    });

    els.toggleKey.addEventListener("click", () => {
      els.apiKey.type = els.apiKey.type === "password" ? "text" : "password";
      toast(els.apiKey.type === "password" ? "API key 已隐藏" : "API key 已显示");
    });

    els.clearSource.addEventListener("click", () => {
      els.sourceText.value = "";
      setStatus("源语料已清空", "warn");
    });

    els.mockGenerate.addEventListener("click", () => {
      const marked = mockMarkedText(els.sourceText.value);
      if (!marked) {
        setStatus("缺少源语料", "warn");
        toast("请先输入源语料");
        return;
      }
      loadMarkedText(marked, "已生成隔字标注", "", "alternate");
      switchPage("recite");
    });

    els.generateApi.addEventListener("click", generateWithDeepSeek);

    els.copyMarked.addEventListener("click", async () => {
      const text = els.markedEditor.textContent.trim();
      if (!text) {
        toast("没有可复制的标注");
        return;
      }
      await navigator.clipboard.writeText(text);
      toast("标注已复制");
    });

    els.reciteView.addEventListener("pointerdown", () => {
      dismissReciteHelp();
    }, { capture: true });

    els.modeTabs.addEventListener("click", (event) => {
      const button = event.target.closest("button[data-mode]");
      if (!button) return;
      setMode(button.dataset.mode);
    });

    els.revealAll.addEventListener("click", () => {
      for (const unit of state.units) {
        unit.hidden = false;
        unit.manual = unit.type !== "keep";
      }
      renderReader();
    });

    els.resetMode.addEventListener("click", applyMode);

    els.reader.addEventListener("contextmenu", (event) => {
      if (event.target.closest(".unit[data-id]")) event.preventDefault();
    });

    els.reader.addEventListener("pointerdown", (event) => {
      const unitElement = event.target.closest(".unit[data-id]");
      if (!unitElement) return;
      const unit = state.units[Number(unitElement.dataset.id)];
      if (!unit) return;
      state.dragging = false;
      state.markDragging = false;
      state.longPressFired = false;
      state.scrollingReader = false;
      state.pointerStart = { x: event.clientX, y: event.clientY, id: Number(unitElement.dataset.id) };
      state.dragHiddenValue = !unit.hidden;
      state.dragImportantValue = !unit.important;
      state.touchedDuringDrag.clear();
      window.clearTimeout(state.longPressTimer);
      state.longPressTimer = window.setTimeout(() => {
        state.longPressFired = true;
        state.markDragging = true;
        state.dragging = false;
        state.touchedDuringDrag.clear();
        clearSelection();
        toggleImportantByElement(unitElement, state.dragImportantValue);
        toast(state.dragImportantValue ? "已标为重点" : "已取消重点");
      }, 450);
      if (event.pointerType !== "touch") {
        event.preventDefault();
        clearSelection();
        els.reader.setPointerCapture(event.pointerId);
      }
    });

    els.reader.addEventListener("pointermove", (event) => {
      if (!state.pointerStart && !state.dragging && !state.markDragging) return;
      if (state.scrollingReader) return;
      const distance = state.pointerStart
        ? Math.hypot(event.clientX - state.pointerStart.x, event.clientY - state.pointerStart.y)
        : 0;
      const dx = state.pointerStart ? event.clientX - state.pointerStart.x : 0;
      const dy = state.pointerStart ? event.clientY - state.pointerStart.y : 0;

      if (event.pointerType === "touch" && !state.longPressFired && !state.dragging && Math.abs(dy) > 10 && Math.abs(dy) > Math.abs(dx) * 1.25) {
        state.scrollingReader = true;
        if (state.longPressTimer) {
          window.clearTimeout(state.longPressTimer);
          state.longPressTimer = 0;
        }
        return;
      }

      event.preventDefault();
      clearSelection();
      const element = document.elementFromPoint(event.clientX, event.clientY);

      if (!state.longPressFired && !state.dragging && distance > 8) {
        if (state.longPressTimer) {
          window.clearTimeout(state.longPressTimer);
          state.longPressTimer = 0;
        }
        state.dragging = true;
        const startElement = els.reader.querySelector(`.unit[data-id="${state.pointerStart.id}"]`);
        if (startElement) toggleUnitByElement(startElement, state.dragHiddenValue);
      }

      if (state.markDragging) {
        if (element) toggleImportantByElement(element, state.dragImportantValue);
      } else if (state.dragging) {
        if (element) toggleUnitByElement(element, state.dragHiddenValue);
      }
    });

    els.reader.addEventListener("pointerup", (event) => {
      if (state.scrollingReader) {
        finishPointerGesture();
        return;
      }
      if (!state.longPressFired && !state.dragging && state.pointerStart) {
        const element = document.elementFromPoint(event.clientX, event.clientY);
        if (element) toggleUnitByElement(element, state.dragHiddenValue);
      }
      finishPointerGesture(event);
    });

    els.reader.addEventListener("pointercancel", () => {
      finishPointerGesture();
    });

    function updateTopSwitchFloatState() {
      document.body.classList.toggle("is-scrolled", window.scrollY > 12);
    }

    let topSwitchTicking = false;
    window.addEventListener("scroll", () => {
      if (topSwitchTicking) return;
      topSwitchTicking = true;
      window.requestAnimationFrame(() => {
        updateTopSwitchFloatState();
        topSwitchTicking = false;
      });
    }, { passive: true });

    updateTopSwitchFloatState();

    loadSettings();
    loadCards();
    renderReader();
    syncReciteHelpVisibility();
    switchPage("config");
  </script>
</body>
</html>
